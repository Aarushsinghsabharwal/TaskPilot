<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --ink: #1a1714;
      --ink-muted: #8a8580;
      --accent: #c84b2f;
      --accent-light: #fdf0ed;
      --border: #e4e0db;
      --done-text: #b0aca7;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 540px;
    }

    header {
      margin-bottom: 40px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.8rem;
      line-height: 1;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: var(--accent);
    }

    .meta {
      margin-top: 8px;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--ink-muted);
    }

    /* Input */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .input-row input {
      flex: 1;
      padding: 14px 18px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--ink);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input::placeholder { color: var(--ink-muted); }
    .input-row input:focus { border-color: var(--accent); }

    .input-row button {
      padding: 14px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #b03d23; }
    .input-row button:active { transform: scale(0.97); }

    /* Filters */
    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filters button {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filters button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    /* Task list */
    #task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      animation: slideIn 0.22s ease;
      transition: opacity 0.2s;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item.done { opacity: 0.6; }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-item.done .checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox svg { display: none; }
    .task-item.done .checkbox svg { display: block; }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 400;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--done-text);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: var(--accent); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--ink-muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    .empty span { display: block; font-size: 2rem; margin-bottom: 10px; }

    /* Footer count */
    .footer {
      margin-top: 24px;
      font-size: 0.8rem;
      color: var(--ink-muted);
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>My <span>Tasks.</span></h1>
      <p class="meta" id="date-label"></p>
    </header>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="What needs doing?" maxlength="120" />
      <button onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all" onclick="setFilter('all', this)">All</button>
      <button data-filter="active" onclick="setFilter('active', this)">Active</button>
      <button data-filter="done" onclick="setFilter('done', this)">Done</button>
    </div>

    <ul id="task-list"></ul>
    <p class="footer" id="footer-count"></p>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let filter = 'all';

    // Set date
    const d = new Date();
    document.getElementById('date-label').textContent =
      d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    function save() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: Date.now(), text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleTask(id) {
      const t = tasks.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('task-list');
      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = `<div class="empty"><span>✦</span>${
          filter === 'done' ? 'Nothing done yet.' :
          filter === 'active' ? 'All caught up!' :
          'No tasks yet. Add one above.'
        }</div>`;
      } else {
        list.innerHTML = visible.map(t => `
          <li class="task-item ${t.done ? 'done' : ''}" id="task-${t.id}">
            <div class="checkbox" onclick="toggleTask(${t.id})">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="task-text">${escHtml(t.text)}</span>
            <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </button>
          </li>
        `).join('');
      }

      const done = tasks.filter(t => t.done).length;
      const total = tasks.length;
      document.getElementById('footer-count').textContent =
        total === 0 ? '' : `${done} of ${total} completed`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
